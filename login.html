<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NurtureEd – Login</title>
  <style>
    * {
      margin: 0; padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #eafaf1, #e3f2fd);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #2c3e50;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.5;
      z-index: 0;
    }
    .blob1 { width: 260px; height: 260px; background: #a8edea; top: 10%; left: 10%; }
    .blob2 { width: 300px; height: 300px; background: #cfd9ff; bottom: 10%; right: 10%; }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 24px;
      background: white;
      border: none;
      padding: 8px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.9rem;
      color: #2c7a7b;
      box-shadow: 0 4px 10px rgba(0,0,0,0.07);
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 10;
      transition: 0.2s;
    }
    .back-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.1);
    }

    .card {
      position: relative;
      z-index: 2;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.08);
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 600;
      color: #2c7a7b;
      text-align: center;
      margin-bottom: 4px;
    }

    .card h2 {
      text-align: center;
      font-size: 1.3rem;
      color: #2c3e50;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #e0eaef;
      border-radius: 12px;
      font-size: 0.95rem;
      outline: none;
      background: #f8fbfc;
      transition: border 0.2s;
    }
    input:focus {
      border-color: #2c7a7b;
      background: white;
    }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn:hover { transform: translateY(-1px); }

    .btn-primary {
      background: #2c7a7b;
      color: white;
    }
    .btn-secondary {
      background: #e8f7f6;
      color: #2c7a7b;
    }

    .divider {
      text-align: center;
      font-size: 0.8rem;
      color: #aab8c2;
    }
  </style>
</head>
<body>

  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <!-- Back to Home -->
  <button class="back-btn" onclick="window.location.href='index.html'">
    ← Home
  </button>

  <div class="card">
    <div class="logo">NurtureEd</div>
    <h2>Welcome back</h2>

    <input id="email" type="email" placeholder="Email address">
    <input id="password" type="password" placeholder="Password">

    <button class="btn btn-primary" id="loginBtn">Login</button>

    <div class="divider">— or —</div>

    <button class="btn btn-secondary" id="registerBtn">Create Account</button>
  </div>

  <script type="module" src="./login.js"></script>
  <script type="module" src="./auth-state.js"></script>
</body>
</html>
